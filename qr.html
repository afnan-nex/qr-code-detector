<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>QR Code Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root {
    --bg: #52B89A;
    --panel: #FFFFFF;
    --panel-2: #FFFFFF;
    --accent: #FF5A26;
    --accent-2: #F8C537;
    --text: #222222;
    --muted: #222222;
    --danger: #FF5A26;
    --border: #2A2A2A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap');

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    padding: 24px;
    gap: 24px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 8px;
    box-shadow: 6px 6px 0 var(--border);
    flex-shrink: 0;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
  }

  header h1 .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 10px;
    vertical-align: middle;
    border: 2px solid var(--border);
    transition: background 0.3s;
  }
  header h1 .dot.ready { background: #4ade80; }
  header h1 .dot.error { background: var(--danger); }
  header h1 .dot.found { background: #3b82f6; }

  #status {
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    padding: 6px 12px;
    background: var(--accent-2);
    border: 2px solid var(--border);
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #scanner-wrapper {
    flex: 1;
    position: relative;
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 10px;
    box-shadow: 8px 8px 0 var(--border);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 12px;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
    background: #000;
    transform: scaleX(-1);
    border: 3px solid var(--border);
  }

  .scan-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(70%, 320px);
    aspect-ratio: 1 / 1;
    pointer-events: none;
    z-index: 5;
  }

  .scan-overlay .corner {
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 0; left: 0; border-top-width: 5px; border-left-width: 5px; border-top-left-radius: 6px; }
  .corner.tr { top: 0; right: 0; border-top-width: 5px; border-right-width: 5px; border-top-right-radius: 6px; }
  .corner.bl { bottom: 0; left: 0; border-bottom-width: 5px; border-left-width: 5px; border-bottom-left-radius: 6px; }
  .corner.br { bottom: 0; right: 0; border-bottom-width: 5px; border-right-width: 5px; border-bottom-right-radius: 6px; }

  .scan-line {
    position: absolute;
    left: 6px;
    right: 6px;
    height: 4px;
    background: var(--accent-2);
    border: 2px solid var(--border);
    top: 0;
    animation: scanMove 2.4s ease-in-out infinite;
    border-radius: 4px;
    box-shadow: none;
  }

  @keyframes scanMove {
    0% { top: 6px; }
    50% { top: calc(100% - 10px); }
    100% { top: 6px; }
  }

  .controls {
    position: absolute;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  .btn {
    background: var(--panel);
    color: var(--text);
    border: 3px solid var(--border);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 4px 4px 0 var(--border);
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--border);
  }
  .btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--border);
  }
  .btn.primary {
    background: var(--panel);
    color: var(--text);
  }
  .btn.primary:hover {
    background: #F5F5F5;
  }

  .btn:focus,
  .btn:focus-visible {
    outline: none;
    box-shadow: inherit;
    background: inherit;
    color: inherit;
  }   
  .btn.ghost {
    background: var(--panel);
  }

  .btn.selected {
    background: var(--accent);
    color: #FFFFFF;
    border-color: var(--border);
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 var(--border);
    outline: none;
  }

  .btn.selected:hover {
    background: #e84a1f;
  }

  .error-banner {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: rgba(255, 255, 255, 0.95);
    color: var(--text);
    padding: 24px;
    text-align: center;
    z-index: 20;
  }
  .error-banner.show { display: flex; }
  .error-banner h2 {
    margin: 0;
    color: var(--danger);
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .error-banner p {
    margin: 0;
    color: var(--text);
    max-width: 420px;
    line-height: 1.6;
    font-weight: 600;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(34, 34, 34, 0.6);
    backdrop-filter: none;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal-backdrop.show { display: flex; }

  .modal {
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 8px 8px 0 var(--border);
    animation: pop 0.2s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal h2 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }
  .modal h2::before {
    content: "";
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--border);
    box-shadow: none;
  }
  .modal .subtitle {
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal .content {
    background: #F5F5F5;
    border: 3px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 14px;
    font-weight: 600;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 20px;
    line-height: 1.6;
    color: var(--text);
  }
  .modal .actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 8px;
    border: 3px solid var(--border);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 4px 4px 0 var(--border);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 200;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px) {
    header h1 { font-size: 16px; }
    #status { font-size: 12px; padding: 4px 10px; }
    .btn { padding: 10px 14px; font-size: 13px; }
  }
</style>
</head>
<body>
  <div id="app">
    <header>
      <h1><span class="dot" id="statusDot"></span>QR Scanner</h1>
      <span id="status">Initializing Camera...</span>
    </header>

    <div id="scanner-wrapper">
      <video id="video" autoplay playsinline muted tabindex="-1"></video>
      <canvas id="canvas" style="display: none;"></canvas>

      <div class="scan-overlay" aria-hidden="true">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line"></div>
      </div>

      <div class="controls">
        <button class="btn" id="switchCameraBtn" title="Switch Camera" style="display:none;">
          🔄 Switch
        </button>
      </div>

      <div class="error-banner" id="errorBanner">
        <h2 id="errorTitle">Camera Error</h2>
        <p id="errorMessage">Something went wrong.</p>
        <button class="btn primary" id="retryBtn">Retry</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">QR Code Detected</h2>
      <p class="subtitle" id="modalSubtitle">Content</p>
      <div class="content" id="modalContent"></div>
      <div class="actions" id="modalActions">
        <button class="btn primary" id="openBtn" data-action="open" style="display:none;">🔗 Open</button>
        <button class="btn" id="copyBtn" data-action="copy">Copy Link</button>
        <button class="btn ghost" id="cancelBtn" data-action="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  // ---------- DOM ----------
  const statusEl = document.getElementById('status');
  const statusDot = document.getElementById('statusDot');
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  
  const switchBtn = document.getElementById('switchCameraBtn');
  const errorBanner = document.getElementById('errorBanner');
  const errorTitle = document.getElementById('errorTitle');
  const errorMessage = document.getElementById('errorMessage');
  const retryBtn = document.getElementById('retryBtn');

  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalTitle = document.getElementById('modalTitle');
  const modalSubtitle = document.getElementById('modalSubtitle');
  const modalContent = document.getElementById('modalContent');
  const openBtn = document.getElementById('openBtn');
  const copyBtn = document.getElementById('copyBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const modalActions = document.getElementById('modalActions');

  const toastEl = document.getElementById('toast');

  // ---------- State ----------
  let currentStream = null;
  let isScanning = false;
  let animationFrameId = null;
  let lastShownQR = null;
  let lastSeenAt = 0;
  let resetTimer = null;
  const QR_RESET_MS = 1500;

  // ---------- Keyboard Navigation State ----------
  let currentButtonIndex = 0;
  let dialogButtons = [];

  // ---------- Utilities ----------
  function setStatus(text, state) {
    statusEl.textContent = text;
    statusDot.classList.remove('ready', 'error', 'found');
    if (state) statusDot.classList.add(state);
  }

  function showToast(msg, duration = 1800) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove('show'), duration);
  }

  function showError(title, message) {
    errorTitle.textContent = title;
    errorMessage.textContent = message;
    errorBanner.classList.add('show');
    setStatus('Camera Error', 'error');
  }

  function hideError() {
    errorBanner.classList.remove('show');
  }

  function isValidUrl(str) {
    if (!str) return false;
    const s = str.trim();
    if (!/^(https?:\/\/|ftp:\/\/|mailto:|tel:|file:)/i.test(s)) return false;
    try {
      new URL(s);
      return true;
    } catch (_) {
      return false;
    }
  }

  // ---------- Modal ----------
  function showModal(decodedText) {
    const isUrl = isValidUrl(decodedText);
    modalContent.textContent = decodedText;
    modalSubtitle.textContent = isUrl ? 'This looks like a URL' : 'Plain text';
    openBtn.style.display = isUrl ? 'inline-flex' : 'none';
    modalBackdrop.classList.add('show');
    setStatus('QR Code Found', 'found');
    
    // Initialize keyboard navigation
    updateDialogButtons();
    currentButtonIndex = 0;
    selectButton(currentButtonIndex);
  }

  function hideModal() {
    modalBackdrop.classList.remove('show');
    
    // Remove selection highlight
    dialogButtons.forEach(btn => btn.classList.remove('selected'));
    
    if (isScanning) {
      setStatus('Scanning...', 'ready');
      // Resume scanning immediately
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        startScanningLoop();
      }
    }
    
    // Return focus to the video/scanner area
    video.focus();
  }

  cancelBtn.addEventListener('click', () => {
    hideModal();
  });

  openBtn.addEventListener('click', () => {
    const url = modalContent.textContent.trim();
    if (isValidUrl(url)) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
    hideModal();
  });

  copyBtn.addEventListener('click', async () => {
    const text = modalContent.textContent;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showToast('Copied to clipboard');
    } catch (e) {
      showToast('Copy failed');
    }
  });

  modalBackdrop.addEventListener('click', (e) => {
    if (e.target === modalBackdrop) hideModal();
  });

  // ---------- Keyboard Navigation for Dialog ----------
  function updateDialogButtons() {
    dialogButtons = Array.from(modalActions.querySelectorAll('.btn')).filter(btn => {
      return btn.style.display !== 'none';
    });
  }

  function selectButton(index) {
    // Remove selection and focus from all buttons
    dialogButtons.forEach(btn => {
      btn.classList.remove('selected');
      btn.blur();
    });
    
    // Wrap around
    if (index < 0) index = dialogButtons.length - 1;
    if (index >= dialogButtons.length) index = 0;
    
    currentButtonIndex = index;
    dialogButtons[currentButtonIndex].classList.add('selected');
    dialogButtons[currentButtonIndex].focus({ preventScroll: true });
  }

  function activateSelectedButton() {
    const selectedButton = document.querySelector('.modal .btn.selected');
    if (selectedButton) {
      selectedButton.click();
    }
  }

  // Keyboard event listener for the modal

  // Keyboard event listener for the modal
  document.addEventListener('keydown', (e) => {
    if (!modalBackdrop.classList.contains('show')) return;

    updateDialogButtons();

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      selectButton(currentButtonIndex - 1);
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      selectButton(currentButtonIndex + 1);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      activateSelectedButton();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      hideModal();
    }
  });

  // ---------- Camera Access ----------
  async function startCamera() {
    // Stop any previously running camera stream to prevent memory leaks
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showError('Browser Not Supported', 'Your browser does not support camera access. Please use a modern browser like Chrome, Edge, or Firefox.');
      return;
    }

    try {
      setStatus('Initializing Camera...', '');
      
      // Request default webcam
      const stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });

      currentStream = stream;
      video.srcObject = stream;

      // Wait for video metadata to load
      await new Promise((resolve) => {
        if (video.readyState >= 2) {
          resolve();
        } else {
          video.onloadedmetadata = () => {
            resolve();
          };
        }
      });

      await video.play();
      
      setStatus('Scanning...', 'ready');
      startScanningLoop();
    } catch (err) {
      handleCameraError(err);
    }
  }

  function handleCameraError(err) {
    let title = 'Camera Error';
    let msg = 'Unable to access the camera.';
    const name = err.name || '';

    if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
      title = 'Permission Denied';
      msg = 'Camera access was denied. Please allow camera permissions in your browser settings and reload the page.';
    } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
      title = 'No Camera Found';
      msg = 'No camera device was detected on this system.';
    } else if (name === 'NotReadableError' || name === 'TrackStartError') {
      title = 'Camera In Use';
      msg = 'The camera is already being used by another application. Please close it and try again.';
    } else if (name === 'OverconstrainedError') {
      title = 'Camera Constraint Error';
      msg = 'The requested camera configuration is not supported by this device.';
    } else if (name === 'SecurityError') {
      title = 'Security Error';
      msg = 'Camera access requires a secure context (HTTPS or localhost).';
    } else if (name === 'AbortError') {
      title = 'Access Aborted';
      msg = 'Camera access was aborted. Please try again.';
    }

    showError(title, msg);
  }

  // ---------- QR Detection Loop ----------
  function startScanningLoop() {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
    }
    isScanning = true;

    const scanFrame = () => {
      if (!isScanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        // Downscale for performance (max 640px width)
        const maxWidth = 640;
        const scale = Math.min(1, maxWidth / video.videoWidth);
        const w = Math.floor(video.videoWidth * scale);
        const h = Math.floor(video.videoHeight * scale);

        canvas.width = w;
        canvas.height = h;
        
        ctx.drawImage(video, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);

        if (window.jsQR) {
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert',
          });

          if (code) {
            onScanSuccess(code.data);
          } else {
            onScanFailure();
          }
        }
      }

      animationFrameId = requestAnimationFrame(scanFrame);
    };

    animationFrameId = requestAnimationFrame(scanFrame);
  }

  function stopScanningLoop() {
    isScanning = false;
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }
  }

  // ---------- QR Callbacks ----------
  function onScanSuccess(decodedText) {
    lastSeenAt = Date.now();
    if (decodedText === lastShownQR) return;
    lastShownQR = decodedText;
    clearTimeout(resetTimer);
    showModal(decodedText);
  }

  function onScanFailure() {
    if (lastShownQR && Date.now() - lastSeenAt > QR_RESET_MS) {
      lastShownQR = null;
    }
  }

  // ---------- Retry ----------
  retryBtn.addEventListener('click', async () => {
    hideError();
    await startCamera();
  });

  // ---------- Cleanup ----------
  window.addEventListener('beforeunload', () => {
    stopScanningLoop();
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopScanningLoop();
    } else {
      if (currentStream && !errorBanner.classList.contains('show')) {
        startScanningLoop();
      }
    }
  });

  // ---------- Init ----------
  async function init() {
    hideError();
    setStatus('Initializing Camera...', '');
    await startCamera();
  }

  init();
})();
</script>
</body>
</html>
